# environment.d/wsl-gui.conf — WSL2-only GUI-session environment.
#
# systemd reads ~/.config/environment.d/*.conf once per user session
# (via systemd-environment-d-generator), so every GUI app launched
# from that session inherits these — no need to repeat in per-app
# wrappers like ~/bin/kitty-wsl.
#
# Shell CLI processes inherit these too, but none of the variables do
# anything in a shell context (all are Mesa / GL / EGL / portal knobs).
#
# Format is strict key=value, one per line — NO shell expansion, NO
# substitution, NO quoting beyond what literal value requires.
# See systemd.environment-d(5).

# Force D3D12 via NVIDIA adapter for Mesa-backed GUI apps under WSLg.
GALLIUM_DRIVER=d3d12
MESA_D3D12_DEFAULT_ADAPTER_NAME=nvidia

# Lets xdg-desktop-portal pick the GTK backend for file dialogs,
# notifications, etc. WSLg does not set this by default.
XDG_CURRENT_DESKTOP=GNOME

# Suppress known-harmless Mesa / EGL warnings on WSLg; set log levels
# high enough to keep real errors visible.
LIBGL_DRI3_DISABLE=1
EGL_LOG_LEVEL=fatal
MESA_LOG_LEVEL=error

# kitty.conf — terminal emulator configuration
# See docs/design/terminal.md for the specification.

# ── Font and display ──────────────────────────────────────────────────────────
font_family      JetBrains Mono
font_size        13.0
shell_integration enabled
scrollback_lines 10000

# ── Audio and visual feedback ─────────────────────────────────────────────────
enable_audio_bell    no
visual_bell_duration 0
window_alert_on_bell no
confirm_os_window_close 0

# ── Selection and clipboard ───────────────────────────────────────────────────
# Auto-copy on selection. On WSL2 via WSLg this copies to Wayland clipboard,
# not Windows system clipboard. For cross-env clipboard, use OSC 52 via tmux.
copy_on_select clipboard

# ── Key bindings ──────────────────────────────────────────────────────────────
map ctrl+shift+t     new_tab_with_cwd
map ctrl+shift+n     new_os_window_with_cwd
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab
map ctrl+shift+h     show_scrollback
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+0     change_font_size all 0

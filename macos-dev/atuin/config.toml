# atuin/config.toml — shell history management
# See docs/plans/2026-04-12-shell-modernisation-design.md § 3.1
#
# Sync is DISABLED by default. To enable:
#   - Self-hosted: set sync_address to your server URL, auto_sync = true
#   - atuin.sh cloud: sync_address = "https://api.atuin.sh", auto_sync = true
# Encryption key at ~/.local/share/atuin/key is NEVER synced.

# ── UI ──────────────────────────────────────────────────────────────────────
style = "compact"
enter_accept = true

# ── Search ──────────────────────────────────────────────────────────────────
search_mode = "fuzzy"
filter_mode = "global"
workspaces = true
filter_mode_shell_up_key_binding = "directory"

# ── Keymap ──────────────────────────────────────────────────────────────────
keymap_mode = "auto"

# ── Secret filtering ────────────────────────────────────────────────────────
# Default regexes cover AWS keys, GitHub PATs, Slack tokens, Stripe keys.
secrets_filter = true

# Custom filter for variable-assignment-style patterns AND raw token prefixes.
# Unanchored regexes — match anywhere in command.
history_filter = [
  "^.*GITHUB_TOKEN.*$",
  "^.*GH_TOKEN.*$",
  "^.*SECRET.*$",
  "^.*PASSWORD.*$",
  "^.*BEARER.*$",
  "^.*AUTHORIZATION.*$",
  "^.*AWS_ACCESS.*$",
  "^.*AWS_SECRET.*$",
  "^.*AWS_SESSION.*$",
  "^.*ANTHROPIC.*$",
  "^.*OPENAI.*$",
  "^.*ghp_[A-Za-z0-9_]+.*$",
  "^.*gho_[A-Za-z0-9_]+.*$",
  "^.*github_pat_[A-Za-z0-9_]+.*$",
  "^.*glpat-[A-Za-z0-9_-]+.*$",
  # OpenAI sk-/sk-proj-/sk-ant- style keys; lower bound of 20 chars
  # after the sk- prefix rejects false positives like "disk-utils".
  "^.*sk-[A-Za-z0-9_-]{20,}.*$",
  "^.*xoxb-[A-Za-z0-9-]+.*$",
  "^.*xoxp-[A-Za-z0-9-]+.*$",
  "^.*PRIVATE.KEY.*$",
]

# ── Sync DISABLED ───────────────────────────────────────────────────────────
auto_sync = false

[sync]
records = true

[stats]
common_subcommands = [
  "cargo", "docker", "git", "go", "gcloud",
  "kubectl", "npm", "podman", "terraform", "tmux",
]

# ── Theme (Dracula Pro Tier 3 — docs/design/theming.md § 3.3) ──────────────
# Structural + accents profile. Hex values mirror
# $DOTFILES/scripts/lib/dracula-pro-palette.sh exactly.
[theme]
name = "dracula-pro"

[theme.colors]
# Structural
Base          = "#F8F8F2"   # DRACULA_PRO_FOREGROUND
Background    = "#22212C"   # DRACULA_PRO_BACKGROUND
Guidance      = "#7970A9"   # DRACULA_PRO_COMMENT
AlertInfo     = "#80FFEA"   # DRACULA_PRO_CYAN
AlertWarn     = "#FFCA80"   # DRACULA_PRO_ORANGE
AlertError    = "#FF9580"   # DRACULA_PRO_RED
Annotation    = "#7970A9"   # DRACULA_PRO_COMMENT
Title         = "#9580FF"   # DRACULA_PRO_BLUE (Purple alias)
Important     = "#FF80BF"   # DRACULA_PRO_MAGENTA (Pink alias)
# Accents on selected history row
RowAlt        = "#454158"   # DRACULA_PRO_SELECTION
# Semantic — success vs failure tag on history rows
Success       = "#8AFF80"   # DRACULA_PRO_GREEN
Failure       = "#FF9580"   # DRACULA_PRO_RED
# Numeric statistics (counts, durations)
Stats         = "#FFFF80"   # DRACULA_PRO_YELLOW

# config.yml — lazygit configuration
# See docs/design/git.md for the specification.

gui:
  theme:
    activeBorderColor:
      - '#BD93F9'
      - bold
    inactiveBorderColor:
      - '#6272A4'
    optionsTextColor:
      - '#F8F8F2'
    selectedLineBgColor:
      - '#44475A'
    selectedRangeBgColor:
      - '#44475A'
    cherryPickedCommitBgColor:
      - '#44475A'
    cherryPickedCommitFgColor:
      - '#BD93F9'
    unstagedChangesColor:
      - '#FF5555'
    defaultFgColor:
      - '#F8F8F2'
    searchingActiveBorderColor:
      - '#F1FA8C'
  sidePanelWidth: 0.25
  expandFocusedSidePanel: true
  showFileTree: true
  nerdFontsVersion: "3"

git:
  paging:
    colorArg: always
    pager: delta --paging=never --syntax-theme='Dracula'
  commit:
    signOff: false
  fetching:
    interval: 60

keybinding:
  universal:
    quit:            q
    return:          "<esc>"
    scrollUpMain:    k
    scrollDownMain:  j
    prevItem:        k
    nextItem:        j
    scrollLeft:      h
    scrollRight:     l
    nextTab:         "]"
    prevTab:         "["
    openRecentRepos: "<c-r>"

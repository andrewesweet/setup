# starship.toml — prompt configuration with Dracula palette
# See docs/plans/2026-04-12-shell-modernisation-design.md § 3.9

format = """
$directory\
$git_branch\
$git_status\
$kubernetes\
$nodejs$python$golang$terraform\
$cmd_duration\
$line_break\
$character"""

scan_timeout = 30
command_timeout = 1000
palette = "dracula-pro"

[palettes.dracula-pro]
background = "#22212C"
current_line = "#454158"
foreground = "#F8F8F2"
comment = "#7970A9"
cyan = "#80FFEA"
green = "#8AFF80"
orange = "#FFCA80"
pink = "#FF80BF"
purple = "#9580FF"
red = "#FF9580"
yellow = "#FFFF80"

[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold purple"

[git_branch]
symbol = " "
style = "bold pink"

[git_status]
conflicted = "⚡"
ahead = "↑${count}"
behind = "↓${count}"
diverged = "⇕"
modified = "*"
staged = "+"
untracked = "?"
stashed = "\\$"

[character]
vicmd_symbol = "[N](bold green) "
success_symbol = "[I](bold yellow) "
error_symbol = "[I](bold red) "

[cmd_duration]
min_time = 2000
format = " [$duration](yellow)"

[nodejs]
format = "[ $version](green) "
detect_files = ["package.json", ".nvmrc"]

[python]
format = "[ $version](yellow) "

[golang]
format = "[ $version](cyan) "

[kubernetes]
disabled = false
format = "[⎈ $context](cyan) "

[terraform]
format = "[ $version](purple) "

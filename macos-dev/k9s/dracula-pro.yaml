    bgColor:              "#22212C"  # DRACULA_PRO_BACKGROUND
    buttonFgColor:        "#22212C"  # DRACULA_PRO_BACKGROUND (inverted)
    buttonBgColor:        "#9580FF"  # DRACULA_PRO_BLUE
    buttonFocusFgColor:   "#22212C"  # DRACULA_PRO_BACKGROUND

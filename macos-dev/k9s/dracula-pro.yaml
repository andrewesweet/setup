      bgColor:            "#454158"  # DRACULA_PRO_SELECTION
      activeColor:        "#FF80BF"  # DRACULA_PRO_MAGENTA
    status:
      newColor:           "#80FFEA"  # DRACULA_PRO_CYAN
      modifyColor:        "#9580FF"  # DRACULA_PRO_BLUE
      addColor:           "#8AFF80"  # DRACULA_PRO_GREEN

    fgColor:              "#F8F8F2"  # DRACULA_PRO_FOREGROUND
    bgColor:              "#22212C"  # DRACULA_PRO_BACKGROUND
    suggestColor:         "#7970A9"  # DRACULA_PRO_COMMENT

# yazi/theme.toml — Dracula theme
# Source: github.com/dracula/yazi (community-maintained)

[manager]
cwd = { fg = "#80FFEA" }
hovered         = { fg = "#22212C", bg = "#9580FF" }
preview_hovered = { underline = true }
find_keyword    = { fg = "#FFCA80", italic = true }
find_position   = { fg = "#FF80BF", bg = "reset", italic = true }
marker_selected = { fg = "#8AFF80", bg = "#8AFF80" }
marker_copied   = { fg = "#FFFF80", bg = "#FFFF80" }
marker_cut      = { fg = "#FF9580", bg = "#FF9580" }
tab_active      = { fg = "#22212C", bg = "#9580FF" }
tab_inactive    = { fg = "#F8F8F2", bg = "#454158" }
tab_width       = 1
border_symbol   = "│"
border_style    = { fg = "#7970A9" }
syntect_theme   = ""

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "#454158", bg = "#454158" }
mode_normal = { fg = "#22212C", bg = "#9580FF", bold = true }
mode_select = { fg = "#22212C", bg = "#8AFF80", bold = true }
mode_unset  = { fg = "#22212C", bg = "#FFCA80", bold = true }
progress_label   = { fg = "#F8F8F2", bold = true }
progress_normal  = { fg = "#9580FF", bg = "#454158" }
progress_error   = { fg = "#FF9580", bg = "#454158" }
permissions_t = { fg = "#80FFEA" }
permissions_r = { fg = "#FFFF80" }
permissions_w = { fg = "#FF9580" }
permissions_x = { fg = "#8AFF80" }
permissions_s = { fg = "#7970A9" }

[input]
border   = { fg = "#9580FF" }
title    = {}
value    = {}
selected = { reversed = true }

[select]
border   = { fg = "#9580FF" }
active   = { fg = "#FF80BF" }
inactive = {}

[tasks]
border  = { fg = "#9580FF" }
title   = {}
hovered = { underline = true }

[which]
mask            = { bg = "#22212C" }
cand            = { fg = "#80FFEA" }
rest            = { fg = "#7970A9" }
desc            = { fg = "#FF80BF" }
separator       = "  "
separator_style = { fg = "#454158" }

[help]
on      = { fg = "#FF80BF" }
exec    = { fg = "#80FFEA" }
desc    = { fg = "#7970A9" }
hovered = { bg = "#454158", bold = true }
footer  = { fg = "#22212C", bg = "#F8F8F2" }

[filetype]
rules = [
  { mime = "image/*",                fg = "#FFCA80" },
  { mime = "video/*",                fg = "#FFFF80" },
  { mime = "audio/*",                fg = "#FFFF80" },
  { mime = "application/zip",        fg = "#FF80BF" },
  { mime = "application/gzip",       fg = "#FF80BF" },
  { mime = "application/x-tar",      fg = "#FF80BF" },
  { mime = "application/x-bzip",     fg = "#FF80BF" },
  { mime = "application/x-bzip2",    fg = "#FF80BF" },
  { mime = "application/x-7z-compressed", fg = "#FF80BF" },
  { mime = "application/x-rar",      fg = "#FF80BF" },
  { name = "*",                      fg = "#F8F8F2" },
  { name = "*/",                     fg = "#9580FF" },
]
